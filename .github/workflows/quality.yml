name: Quality (Lighthouse CI + Playwright E2E)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI (CWV + bundle budgets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run Lighthouse CI
        run: bunx lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E (mobile + desktop)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        project:
          - desktop-chromium
          - desktop-firefox
          - mobile-iphone
          - mobile-pixel
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps ${{ contains(matrix.project, 'firefox') && 'firefox' || 'chromium' }}
      - name: Run E2E (${{ matrix.project }})
        run: bunx playwright test --project=${{ matrix.project }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          if-no-files-found: ignore
